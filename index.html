<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useRef } from "react";
        import { createRoot } from "react-dom/client";
        import { motion, animate, useInView, AnimatePresence } from "framer-motion";

        // [모듈 1] 숫자 카운터
        const Counter = ({ target, duration = 2, suffix = "", decimals = 0 }) => { 
            const [count, setCount] = useState(0); 
            const ref = useRef(null); 
            const isInView = useInView(ref, { once: true }); 
            useEffect(() => { if (isInView) { const controls = animate(0, target, { duration: duration, onUpdate: (value) => setCount(value), }); return () => controls.stop(); } }, [isInView, target]); 
            return <span ref={ref}>{count.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals})}{suffix}</span>; 
        };

        // [추가] 채팅 입력 중 애니메이션 컴포넌트
        const TypingIndicator = () => (
            <div className="flex space-x-1.5 p-3 bg-white/10 rounded-2xl w-16 mb-4">
                {[0, 1, 2].map((i) => (
                    <motion.div
                        key={i}
                        animate={{ opacity: [0.3, 1, 0.3] }}
                        transition={{ repeat: Infinity, duration: 1, delay: i * 0.2 }}
                        className="w-1.5 h-1.5 bg-amber-400 rounded-full"
                    />
                ))}
            </div>
        );

        // [모듈 2] 통계 섹션
        const StatSection = () => { 
            const stats = [ 
                { label: "현장 경력", value: 15, suffix: "년", sub: "15년간 쌓아온 숙련도" }, 
                { label: "누적 해결 사례", value: 5742, suffix: "건", sub: "다양한 가구 구조 데이터" }, 
                { label: "시공 만족도", value: 4.9, suffix: "/5.0", sub: "실제 고객이 증명하는 품질" }, 
                { label: "하자 발생율", value: 0, suffix: "%", sub: "완벽을 기하는 책임 시공" } 
            ]; 
            return ( 
                <section className="px-6 py-20 bg-white border-y expert-border"> 
                    <div className="grid grid-cols-2 gap-y-12 gap-x-8"> 
                        {stats.map((stat, idx) => ( 
                            <motion.div key={idx} initial={{ opacity: 0 }} whileInView={{ opacity: 1 }} transition={{ delay: idx * 0.1 }} className="text-left group"> 
                                <div className="text-amber-500 text-[10px] font-black tracking-widest uppercase mb-2">핵심 지표 {idx + 1}</div>
                                <div className="text-3xl font-light text-slate-900 mb-1 border-b expert-border pb-2 flex justify-between items-end">
                                    <Counter target={stat.value} suffix={stat.suffix} decimals={stat.label === "시공 만족도" ? 1 : 0} />
                                    <span className="text-slate-200 group-hover:text-amber-200 transition-colors">●</span>
                                </div>
                                <div className="text-sm font-bold text-slate-800 mt-2">{stat.label}</div> 
                                <div className="text-[11px] text-slate-400 font-medium leading-none mt-1">{stat.sub}</div>
                            </motion.div> 
                        ))} 
                    </div> 
                </section> 
            ); 
        };

        // [모듈 3] 서비스 비교 섹션
        const ComparisonSection = () => { 
            const compareData = [ 
                { label: "작업 주체", us: "가족(부자) 직접 시공", others: "단순 용역/알바" }, 
                { label: "보양 작업", us: "바닥/가구 전용 보양", others: "보양 없이 작업" }, 
                { label: "수평 조절", us: "전문 장비 수평 무료", others: "단순 이동만 수행" }, 
                { label: "현장 추가금", us: "0원 (정찰제 원칙)", others: "빈번하게 발생" } 
            ]; 
            return ( 
                <section className="px-6 py-20 bg-slate-50 text-center relative overflow-hidden text-white"> 
                    <div className="relative z-10">
                        <h2 className="text-2xl font-bold text-slate-900 mb-2">왜 '아빠와 아들'일까요?</h2> 
                        <p className="text-slate-500 text-sm mb-10">결과가 다른 프리미엄의 차이</p> 
                        <div className="overflow-hidden rounded-[32px] border border-slate-200 shadow-xl bg-white"> 
                            <div className="grid grid-cols-12 font-bold text-[11px] bg-slate-100/50 border-b border-slate-100 text-slate-400"> 
                                <div className="col-span-3 py-4">비교 항목</div> 
                                <div className="col-span-5 py-4 text-white bg-amber-500 shadow-[inset_0_0_20px_rgba(0,0,0,0.1)]">아빠와 아들</div> 
                                <div className="col-span-4 py-4">일반 업체</div> 
                            </div> 
                            {compareData.map((item, idx) => ( 
                                <motion.div key={idx} initial={{ opacity: 0, x: -10 }} whileInView={{ opacity: 1, x: 0 }} transition={{ delay: idx * 0.15 }} className="grid grid-cols-12 items-center border-b border-slate-50 last:border-0 group"> 
                                    <div className="col-span-3 py-5 text-[10px] sm:text-[11px] font-bold text-slate-500 bg-slate-50/50">{item.label}</div> 
                                    <div className="col-span-5 py-5 bg-amber-50/50 text-[12px] font-black text-amber-700 relative text-center">
                                        <div className="absolute inset-0 border-x-2 border-amber-200/50 pointer-events-none"></div>
                                        <motion.span initial={{ scale: 1 }} whileInView={{ scale: [1, 1.05, 1] }} transition={{ repeat: Infinity, duration: 3, delay: idx * 0.5 }} className="inline-block"> ✨ {item.us} </motion.span>
                                    </div> 
                                    <div className="col-span-4 py-5 text-[11px] font-medium text-slate-300 text-center">❌ {item.others}</div> 
                                </motion.div> 
                            ))} 
                        </div> 
                    </div>
                </section> 
            ); 
        };

       const PortfolioSection = ({ type = 'moving' }) => {
            const data = {
                'moving': {
                    main: ["A7.jpg", "stone2.jpg", "A8.jpg", "A2.jpg"],
                    scroll: ["A9.jpg", "stonebad.jpg", "a4.jpg", "stone2.jpg", "A1.jpg", "sh k.jpg", "A2.jpg", "sh4.jpg"]
                },
                'disposal': {
                     main: ["A6.jpg", "stone2.jpg", "A8.jpg", "A2.jpg"],
                    scroll: ["A9.jpg", "stonebad.jpg", "a4.jpg", "stone2.jpg", "A1.jpg", "sh k.jpg", "A2.jpg", "sh4.jpg"]
                },
                'hanger': {
                    main: ["sh.jpg", "sh2.jpg", "sh3.jpg", "sh4.jpg"],
                    scroll: ["sh.jpg", "sh2.jpg", "sh3.jpg", "sh4.jpg", "sh.jpg", "sh2.jpg", "sh3.jpg", "sh4.jpg"]
                }
            };

            const selected = data[type] || data['moving'];
            const doubledScroll = [...selected.scroll, ...selected.scroll];

            return (
                <section className="py-24 bg-white">
                    <div className="px-6 mb-12 text-left">
                        <div className="flex items-center space-x-2 mb-3">
                            <div className="w-8 h-[1px] bg-amber-500"></div>
                            <div className="text-amber-600 text-[10px] font-black tracking-[0.4em] uppercase">검증된 시공 실적</div>
                        </div>
                        <h2 className="text-[28px] font-black text-slate-900 tracking-tight leading-none">포트폴리오 리포트</h2>
                        <p className="text-slate-400 text-xs mt-3 font-medium">엄격한 공정 관리와 정밀한 시공으로 기록된 실제 현장 데이터입니다.</p>
                    </div>

                    {/* [전문가형 그리드] */}
                    <div className="px-5 grid grid-cols-2 gap-3 mb-16">
                        {selected.main.map((img, i) => (
                            <motion.div 
                                key={i} 
                                initial={{ opacity: 0, y: 10 }} 
                                whileInView={{ opacity: 1, y: 0 }} 
                                transition={{ delay: i * 0.1 }}
                                className="group relative aspect-[4/5] bg-slate-100 rounded-sm overflow-hidden border-2 border-slate-900/5 shadow-md"
                            >
                              <img src={img} loading="lazy" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                {/* 전문적인 오버레이 및 태그 */}
                                <div className="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-80"></div>
                                <div className="absolute bottom-3 left-3 right-3 flex justify-between items-end">
                                   <div>
                                        <div className="text-[9px] text-amber-400 font-black tracking-widest uppercase mb-0.5">문서 번호</div>
                                        <div className="text-white text-[13px] font-bold tracking-tighter">시공 사례 #{String(i + 1).padStart(2, '0')}</div>
                                    </div>
                                    <div className="w-5 h-5 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-[10px] text-white">✓</div>
                                </div>
                                {/* 얇은 프레임 효과 */}
                                <div className="absolute inset-2 border border-white/10 pointer-events-none"></div>
                            </motion.div>
                        ))}
                    </div>

                   {/* [고속 자동 슬라이더] */}
                    <div className="bg-slate-900 py-10 border-y-4 border-amber-500/10 overflow-hidden relative">
                        <div className="absolute top-0 left-0 w-20 h-full bg-gradient-to-r from-slate-900 to-transparent z-10"></div>
                        <div className="absolute top-0 right-0 w-20 h-full bg-gradient-to-l from-slate-900 to-transparent z-10"></div>
                        
                        <p className="px-6 text-[10px] font-black text-amber-500/50 mb-6 tracking-[0.3em] uppercase text-center">실시간 작업 현장 스냅</p>
                        
                        <motion.div 
                            className="flex space-x-2 px-2"
                            animate={{ x: [0, -((128 + 8) * 8)] }}
                            transition={{ repeat: Infinity, duration: 10, ease: "linear" }} // 속도를 살짝 더 빠르게 상향
                        >
                            {doubledScroll.map((img, i) => (
                                <div key={i} className="flex-shrink-0 w-32 h-40 rounded-sm overflow-hidden border border-white/10 transition-all duration-500">
                                    <img src={img} className="w-full h-full object-cover" />
                                </div>
                            ))}
                        </motion.div>
                        
                        <div className="px-6 mt-8 flex justify-center items-center space-x-3">
                            <span className="h-[1px] w-4 bg-slate-700"></span>
                            <p className="text-[10px] text-slate-500 font-bold italic tracking-tighter">
                                모든 공정은 <span className="text-slate-300">정용원 대표</span>가 직접 엄격히 관리합니다
                            </p>
                            <span className="h-[1px] w-4 bg-slate-700"></span>
                        </div>
                    </div>
                </section>
            );
        };
        // [모듈 5] 리뷰 슬라이더
        const ReviewSlider = () => { 
            const reviewImages = [ 
                { url: "1.jpg", tag: "당근마켓 후기" }, 
                { url: "2.jpg", tag: "당근마켓 후기" }, 
                { url: "3.jpg", tag: "당근마켓 후기" }, 
                { url: "4.jpg", tag: "당근마켓 후기" },
                { url: "5.jpg", tag: "당근마켓 후기" }, 
                { url: "6.jpg", tag: "숨고 후기" }, 
                { url: "7.jpg", tag: "숨고 후기" }, 
                { url: "8.jpg", tag: "숨고 후기" } 
            ]; 
            const doubled = [...reviewImages, ...reviewImages]; 
            return ( 
                <section className="py-16 bg-slate-50 overflow-hidden"> 
                    <div className="text-center mb-8 px-6"> 
                        <div className="inline-block px-3 py-1 bg-amber-100 text-amber-700 text-[11px] font-bold rounded-full mb-3">REAL REVIEWS</div> 
                        <h2 className="text-2xl font-bold text-slate-900">조작 없는 생생한 후기</h2> 
                    </div> 
                   {/* 속도를 duration: 15로 상향 (기존 25), 비율을 w-[280px] h-[350px]로 4:5 조정 */}
{/* 이동 거리 계산: (이미지너비 280px + 간격 16px) * 8장 = 2368px */}
<motion.div className="flex space-x-4" animate={{ x: [0, -2368] }} transition={{ repeat: Infinity, duration: 35, ease: "linear" }}> 
    {doubled.map((r, i) => ( 
       <div key={i} className="flex-shrink-0 w-[280px] h-[350px] rounded-3xl overflow-hidden border shadow-lg relative">
            <img src={r.url} loading="lazy" className="w-full h-full object-cover" />
                                <div className="absolute top-4 left-4 px-3 py-1 bg-black/60 text-white text-[10px] font-bold rounded-full">{r.tag}</div> 
                            </div>
                        ))} 
                    </motion.div> 
                </section> 
            ); 
        };

        // [모듈 6] 작업 프로세스
        const ProcessSection = () => { 
            const steps = [ 
                { title: "사진 접수 및 견적 확정", desc: "가구 사진으로 확정 견적을 드립니다.", icon: "📸" }, 
                { title: "현장 방문 및 보양 작업", desc: "전용 보양재로 바닥과 벽을 보호합니다.", icon: "🏠" }, 
                { title: "안전한 가구 이동", desc: "15년 노하우로 손상 없이 이동합니다.", icon: "🚚" }, 
                { title: "수평 조절 및 설치", desc: "가구 균형을 완벽하게 잡아드립니다.", icon: "⚙️" }, 
                { title: "뒷정리 및 사후 관리", desc: "깔끔한 정리와 A/S 정책을 안내합니다.", icon: "✨" } 
            ]; 
            return ( 
                <section className="px-6 py-16 bg-slate-900 text-white relative"> 
                    <h2 className="text-2xl font-bold mb-12 text-center text-white">작업 프로세스</h2> 
                    <div className="absolute left-[39px] top-40 bottom-24 w-0.5 border-l-2 border-dashed border-slate-700"></div> 
                    <div className="space-y-10 text-left"> 
                        {steps.map((s, i) => ( 
                            <motion.div key={i} initial={{ opacity: 0, x: -20 }} whileInView={{ opacity: 1, x: 0 }} className="relative flex items-start space-x-6"> 
                                <div className="relative z-10 w-14 h-14 bg-amber-400 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-amber-400/20">{s.icon}</div> 
                                <div className="flex-1 pt-1"> 
                                    <h3 className="text-lg font-bold text-white">{s.title}</h3> 
                                    <p className="text-slate-400 text-[13px]">{s.desc}</p> 
                                </div> 
                            </motion.div> 
                        ))} 
                    </div> 
                </section> 
            ); 
        };

        // [모듈 7] FAQ 섹션
        const FAQSection = () => { 
            const [openIdx, setOpenIdx] = useState(null); 
            const faqs = [ 
                { q: "가구 파손시 어떻게 되나요?", a: "작업중 발생하는 모든 가구, 집안내 파손은 100% 보상해드립니다." }, 
                { q: "현장 추가금이 있나요?", a: "사진과 정보가 정확하다면 추가금을 요구하지 않는 정찰제 원칙을 준수합니다." }, 
                { q: "비용이 어느정도 나올까요?", a: "바로 아래 견적서를 작성해주시면 정확한 견적상담 도와드리겠습니다~!" } 
            ]; 
            return ( 
                <section className="px-6 py-16 bg-white"> 
                    <h2 className="text-2xl font-bold mb-8 text-left">자주 묻는 질문</h2> 
                    {faqs.map((f, i) => ( 
                        <div key={i} className="border-b border-slate-100 last:border-0 text-left"> 
                            <button onClick={() => setOpenIdx(openIdx === i ? null : i)} className="w-full py-5 flex justify-between items-center text-left font-bold text-slate-800"> 
                                <span>{f.q}</span> 
                                <span className="text-amber-500">{openIdx === i ? '−' : '+'}</span> 
                            </button> 
                            <AnimatePresence> 
                                {openIdx === i && ( 
                                    <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: "auto", opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden pb-5 text-[13px] text-slate-500 leading-relaxed"> 
                                        {f.a} 
                                    </motion.div> 
                                )} 
                            </AnimatePresence> 
                        </div> 
                    ))} 
                </section> 
            ); 
        };

        const regionData = {
            "경기도": ["수원시", "성남시", "용인시", "화성시", "안산시", "안양시", "평택시", "시흥시", "광명시", "군포시", "이천시", "오산시", "안성시", "의왕시"],
            "서울특별시": ["강남구", "강동구", "강북구", "강서구", "관악구", "광진구", "구로구", "금천구", "노원구", "도봉구", "동대문구", "동작구", "마포구", "서대문구", "서초구", "성동구", "성북구", "송파구", "양천구", "영등포구", "용산구", "은평구", "종로구", "중구", "중랑구"],
            "인천광역시": ["계양구", "미추홀구", "남동구", "동구", "부평구", "서구", "연수구", "중구"],
            "충청남도": ["천안시", "아산시", "당진시", "서산시"]
        };

        // [모듈 8] 견적 신청 폼 (업그레이드된 사진 전송 포함)
     const MultiStepQuoteForm = () => { 
            const [step, setStep] = useState(1); 
            const [isExpanded, setIsExpanded] = useState(false); 
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);
            const [isTyping, setIsTyping] = useState(false); // [추가] 대표님이 메시지 적는 중인지 여부
           const [formData, setFormData] = useState({ service: '', province: '', city: '', content: '', date: '', dateNone: false, photoData: null, photoName: '', phone: '' });

            // 배경 스크롤 방지 및 타이핑 효과
            useEffect(() => {
                if (isExpanded) {
                    document.body.style.overflow = 'hidden'; // 배경 스크롤 완전 차단
                    setIsTyping(true);
                    const timer = setTimeout(() => setIsTyping(false), 1200);
                    return () => clearTimeout(timer);
                } else {
                    document.body.style.overflow = 'unset'; // 견적서 닫으면 해제
                }
            }, [step, isExpanded]);

            const next = () => {
                if (!isExpanded) setIsExpanded(true); 
                setStep(s => s + 1);
            };
            const prev = () => setStep(s => Math.max(1, s - 1));

            // [아이디어 16, 17] 전화번호 자동 하이픈 포맷팅
            const handlePhoneChange = (e) => {
                const val = e.target.value.replace(/[^\d]/g, '');
                let formatted = val;
                if (val.length > 3 && val.length <= 7) {
                    formatted = `${val.slice(0, 3)}-${val.slice(3)}`;
                } else if (val.length > 7) {
                    formatted = `${val.slice(0, 3)}-${val.slice(3, 7)}-${val.slice(7, 11)}`;
                }
                setFormData({ ...formData, phone: formatted });
            };

            // [아이디어 7] 키워드 태그 클릭 시 자동 입력
            const addKeyword = (tag) => {
                const currentContent = (formData.content || "").trim();
                const newContent = currentContent ? `${currentContent}, ${tag}` : tag;
                setFormData({ ...formData, content: newContent });
            };

            // [추가 요청] 뒤로가기 클릭 시 이탈 방지 컨펌 로직
            const handleExit = () => {
                if (window.confirm("비용 확인이 거의 다 됐습니다! 정말로 나가시겠습니까?")) {
                    setIsExpanded(false);
                    setStep(1);
                    setFormData({ service: '', province: '', city: '', content: '', date: '', dateNone: false, photoData: null, photoName: '', phone: '' });
                    window.scrollTo({ top: document.getElementById('quote-form').offsetTop - 100, behavior: 'smooth' });
                }
            };
            // [아이디어 4] 단계별 격려 메시지
            const getEncouragement = (step) => {
                const messages = {
                    1: "첫 단추를 끼우셨네요! 금방 끝납니다. 😊",
                    2: "경기남부 어디든 달려갑니다!",
                    3: "상세히 적어주실수록 견적이 더 정확해져요!",
                    4: "거의 다 왔어요! 날짜는 편하게 골라주세요.",
                    5: "사진까지 있으면 사장님이 아주 좋아하십니다! 📸",
                    6: "마지막입니다! 연락처만 남겨주시면 끝나요."
                };
                return messages[step] || "";
            };

         const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 전송 전 이미지 용량 압축 및 리사이징 (GAS 전송 속도 최적화)
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; // 가로 최대 1000px로 리사이징
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // 압축률을 0.6으로 설정하여 화질 저하를 최소화하며 용량을 대폭 축소
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        setFormData({ ...formData, photoData: compressedDataUrl, photoName: file.name });
                    };
                };
            };
            const handleSubmit = async () => {
                if (loading) return;
                setLoading(true);
                
                const GAS_URL = "https://script.google.com/macros/s/AKfycbzTIfAvR-R5AY91bR2LZX15BumZ0v7L2uDyI7__M2WatINXekf9a75a60xzNf3ZsxNztA/exec";

                try {
                    await fetch(GAS_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },

                    setIsSubmitted(true);
                    confetti({

                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#f59e0b', '#ffffff', '#fbbf24']
                    });
                } catch (error) {

                    alert("접수 중 오류가 발생했습니다. 카카오톡으로 직접 문의 부탁드립니다.");

                    </section>

                       {step === 3 && !isTyping && (

                                        return (

                                <div className="relative group">

                                <motion.button

                        {step === 4 && (

                                <div className="grid grid-cols-2 gap-4">
                                    {/* 사진 촬영 버튼 */}

                                        <p className="text-sm font-bold">사진 촬영</p>

                                    {/* 앨범 선택 버튼 */}
                                    <div className="relative h-32 bg-white/10 border-2 border-dashed border-white/20 rounded-[25px] flex flex-col items-center justify-center">

                                    </div>
                                </div>
                                
                                {formData.photoData && (
                                    <div className="bg-amber-400/20 border border-amber-400/50 p-4 rounded-2xl flex items-center justify-between">

                        <motion.a
